name: Checkstyle Code Quality

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  checkstyle:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Run Checkstyle
      run: mvn checkstyle:check